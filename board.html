<script>
const ADMIN_PASSWORD = 'pcbuilder2026';
const CAT_LABEL = { parts:'パーツ', bto:'BTO', build:'自作相談', sale:'セール', general:'雑談' };
const CAT_CLASS = { parts:'badge-cat-parts', bto:'badge-cat-bto', build:'badge-cat-build', sale:'badge-cat-sale', general:'badge-cat-general' };
let filterCat = 'all';
let currentThread = null;
let isAdmin = false;
let likeCounts = JSON.parse(localStorage.getItem('board_likes') || '{}');
let threads = JSON.parse(localStorage.getItem('threads') || '[]');

function renderThreads() {
  const list = document.getElementById('thread-list');
  const filtered = filterCat==='all' ? threads : threads.filter(t=>t.cat===filterCat);
  if (filtered.length===0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">まだスレッドがありません</div><div class="empty-state-sub">最初のスレッドを立ててみましょう！</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="thread-card" onclick="openThread('${t.id}')">
      <div class="thread-header">
        <div class="thread-badges"><span class="badge ${CAT_CLASS[t.cat]}">${CAT_LABEL[t.cat]}</span></div>
        <div class="thread-stats"><span class="stat">💬 ${t.comments.length}</span><span class="stat">👁 ${t.views||0}</span></div>
      </div>
      <div class="thread-title">${t.title}</div>
      <div class="thread-preview">${t.body}</div>
      <div class="thread-meta">
        <div class="thread-meta-left">
          <span class="thread-author">👤 ${t.author}</span>
          <span class="thread-date">${t.date}</span>
          <span class="thread-last">最終返信: ${t.lastReply}</span>
        </div>
        ${isAdmin ? `<div class="admin-thread-btns" onclick="event.stopPropagation()"><button class="admin-del-btn" onclick="deleteThread('${t.id}')">🗑️ 削除</button></div>` : ''}
      </div>
    </div>`).join('');
}

function openThread(id) {
  currentThread = threads.find(t=>t.id===id);
  if (!currentThread) return;
  currentThread.views = (currentThread.views||0) + 1;
  saveThreads();
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0,0);
  document.getElementById('detail-title-wrap').innerHTML = `
    <div class="thread-badges" style="margin-bottom:8px;"><span class="badge ${CAT_CLASS[currentThread.cat]}">${CAT_LABEL[currentThread.cat]}</span></div>
    <div class="detail-title">${currentThread.title}</div>
    <div class="detail-meta"><span class="thread-author">👤 ${currentThread.author}</span><span class="thread-date">${currentThread.date}</span><span class="stat">💬 ${currentThread.comments.length}件の返信</span></div>`;
  renderComments();
}

function renderComments() {
  document.getElementById('comments-wrap').innerHTML = currentThread.comments.map(c => {
    const key = currentThread.id + '-' + c.id;
    const likes = likeCounts[key] !== undefined ? likeCounts[key] : (c.likes||0);
    return `<div class="comment ${c.isOP?'op':''}">
      <div class="comment-header">
        <div><span class="comment-author">${c.author}</span>${c.isOP?'<span class="comment-op-badge">OP</span>':''}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="comment-date">${c.date}</span>
          ${isAdmin ? `<button class="admin-del-btn" onclick="deleteComment('${c.id}')">🗑️</button>` : ''}
        </div>
      </div>
      <div class="comment-body">${c.body}</div>
      <div class="comment-actions"><button class="like-btn" onclick="likeComment('${c.id}')">👍 ${likes}</button></div>
    </div>`;
  }).join('');
}

function likeComment(cid) {
  const key = currentThread.id + '-' + cid;
  likeCounts[key] = (likeCounts[key]!==undefined ? likeCounts[key] : 0) + 1;
  localStorage.setItem('board_likes', JSON.stringify(likeCounts));
  renderComments();
}

function deleteThread(id) {
  if (!confirm('このスレッドを削除しますか？')) return;
  threads = threads.filter(t=>t.id!==id);
  saveThreads();
  renderThreads();
}

function deleteComment(cid) {
  if (!confirm('この返信を削除しますか？')) return;
  currentThread.comments = currentThread.comments.filter(c=>c.id!==cid);
  saveThreads();
  renderComments();
}

function saveThreads() {
  localStorage.setItem('threads', JSON.stringify(threads));
}

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('detail-view').style.display='none';
  document.getElementById('list-view').style.display='block';
  window.scrollTo(0,0);
});

document.getElementById('reply-submit').addEventListener('click', () => {
  const name = document.getElementById('reply-name').value.trim();
  const body = document.getElementById('reply-body').value.trim();
  if (!name||!body) { alert('ニックネームと返信内容を入力してください。'); return; }
  currentThread.comments.push({ id: Date.now().toString(), author: name, date: new Date().toLocaleString('ja-JP',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}), body, isOP: false, likes: 0 });
  currentThread.lastReply = 'たった今';
  saveThreads();
  document.getElementById('reply-name').value = '';
  document.getElementById('reply-body').value = '';
  renderComments();
  document.getElementById('comments-wrap').lastElementChild?.scrollIntoView({behavior:'smooth'});
});

document.querySelectorAll('.chip[data-val]').forEach(chip => {
  chip.addEventListener('click', function() {
    filterCat = this.dataset.val;
    document.querySelectorAll('.chip[data-val]').forEach(c=>c.classList.remove('active'));
    this.classList.add('active');
    renderThreads();
  });
});

document.getElementById('post-btn').addEventListener('click', () => { document.getElementById('modal').style.display='flex'; });
document.getElementById('modal-close').addEventListener('click', () => { document.getElementById('modal').style.display='none'; });
document.getElementById('cancel-btn').addEventListener('click', () => { document.getElementById('modal').style.display='none'; });

document.getElementById('modal-submit').addEventListener('click', () => {
  const cat = document.getElementById('f-cat').value;
  const name = document.getElementById('f-name').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  if (!name||!title||!body) { alert('すべての項目を入力してください。'); return; }
  const now = new Date();
  threads.unshift({ id: Date.now().toString(), cat, title, author: name, date: now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}), lastReply: 'たった今', views: 0, body, comments: [{ id: '1', author: name, date: now.toLocaleString('ja-JP',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}), body, isOP: true, likes: 0 }] });
  saveThreads();
  document.getElementById('modal').style.display='none';
  document.getElementById('f-name').value=''; document.getElementById('f-title').value=''; document.getElementById('f-body').value='';
  renderThreads();
});

// 管理者モード
document.getElementById('admin-toggle').addEventListener('click', () => {
  if (isAdmin) { isAdmin=false; document.getElementById('admin-toggle').classList.remove('active'); document.getElementById('admin-toggle').textContent='🔐 管理者モード'; renderThreads(); }
  else { document.getElementById('admin-modal').style.display='flex'; }
});
document.getElementById('admin-login-btn').addEventListener('click', () => {
  if (document.getElementById('admin-pw').value===ADMIN_PASSWORD) { isAdmin=true; document.getElementById('admin-modal').style.display='none'; document.getElementById('admin-toggle').classList.add('active'); document.getElementById('admin-toggle').textContent='✅ 管理者モード中'; document.getElementById('admin-pw').value=''; renderThreads(); }
  else { alert('パスワードが違います。'); }
});

// チャット
(function(){const fab=document.getElementById('chat-fab'),win=document.getElementById('chat-window'),msgs=document.getElementById('chat-messages'),input=document.getElementById('chat-input');let h=[];fab.addEventListener('click',()=>{const o=win.style.display!=='none';win.style.display=o?'none':'flex';win.style.flexDirection='column';if(!o)input.focus();});document.getElementById('chat-close').addEventListener('click',()=>{win.style.display='none';});function addMsg(t,r){const d=document.createElement('div');d.className='msg '+r;d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;}async function send(){const t=input.value.trim();if(!t)return;input.value='';addMsg(t,'user');h.push({role:'user',content:t});const th=addMsg('考え中...','thinking-msg');try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'gpt-4o',max_tokens:600,system:'あなたはPCパーツ・自作PCの専門家です。質問に日本語で簡潔に答えてください。',messages:h})});const data=await res.json();const reply=data.choices?.[0]?.message?.content||data.content?.map(b=>b.text||'').join('')||'エラーが発生しました。';h.push({role:'assistant',content:reply});th.remove();addMsg(reply,'bot');}catch(e){th.remove();addMsg('エラーが発生しました。','bot');}}document.getElementById('chat-send').addEventListener('click',send);input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});})();

renderThreads();
</script>
</body>
