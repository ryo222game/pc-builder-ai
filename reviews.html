];

let reviews = [...SAMPLE_REVIEWS];
const helpfulCounts = {};

function stars(rating) {
  return Array.from({length: 5}, (_, i) =>
    `<span class="star">${i < rating ? '★' : '☆'}</span>`
  ).join('');
}

function catClass(cat) {
  return { parts: 'cat-parts', bto: 'cat-bto', peripheral: 'cat-peripheral' }[cat] || '';
}
function catLabel(cat) {
  return { parts: 'パーツ', bto: 'BTO', peripheral: '周辺機器' }[cat] || '';
}

function renderReviews() {
  const wrap = document.getElementById('reviews-wrap');
  const filtered = filterCat === 'all' ? reviews : reviews.filter(r => r.cat === filterCat);
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty"><div style="font-size:36px;margin-bottom:12px;">📝</div><div style="font-size:14px;">まだレビューがありません</div></div>';
    return;
  }
  wrap.innerHTML = filtered.map(r => `
    <div class="review-card">
      <div class="review-header">
        <div class="review-product">
          <span class="review-cat ${catClass(r.cat)}">${catLabel(r.cat)}</span>
          <div class="review-product-name">${r.product}</div>
        </div>
        <div class="review-rating">
          <div class="stars">${stars(r.rating)}</div>
          <span class="rating-num">${r.rating}.0</span>
        </div>
      </div>
      <div class="review-meta">
        <span class="reviewer">👤 ${r.reviewer}</span>
        <span class="review-date">${r.date}</span>
        <span class="review-use">${r.use}</span>
      </div>
      <div class="review-title">${r.title}</div>
      <div class="review-body">${r.body}</div>
      <div class="review-pros-cons">
        <div class="pros">
          <div class="pros-title">Good</div>
          <ul>${r.pros.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="cons">
          <div class="cons-title">Bad</div>
          <ul>${r.cons.map(c => `<li>${c}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="review-footer">
        <div class="helpful">
          <span>参考になった: ${helpfulCounts[r.id] !== undefined ? helpfulCounts[r.id] : r.helpful}件</span>
          <button class="helpful-btn" onclick="markHelpful(${r.id})">👍 参考になった</button>
        </div>
        <a class="amazon-btn" href="${r.amazonUrl}" target="_blank" rel="noopener sponsored">Amazonで見る →</a>
      </div>
    </div>
  `).join('');
}

function markHelpful(id) {
  const r = reviews.find(r => r.id === id);
  if (!r) return;
  helpfulCounts[id] = (helpfulCounts[id] !== undefined ? helpfulCounts[id] : r.helpful) + 1;
  renderReviews();
}

document.querySelectorAll('.chip[data-val]').forEach(chip => {
  chip.addEventListener('click', function() {
    filterCat = this.dataset.val;
    document.querySelectorAll('.chip[data-val]').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    renderReviews();
  });
});

// モーダル
document.getElementById('write-btn').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'flex';
});
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
});
document.getElementById('cancel-btn').addEventListener('click', () => {
  document.getElementById('modal').style.display = 'none';
});

// 星選択
document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    selectedRating = parseInt(this.dataset.val);
    document.querySelectorAll('.star-btn').forEach((b, i) => {
      b.classList.toggle('active', i < selectedRating);
    });
  });
});

document.getElementById('submit-btn').addEventListener('click', () => {
  const product = document.getElementById('f-product').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  const cat = document.getElementById('f-cat').value;
  const use = document.getElementById('f-use').value.trim();
  const pros = document.getElementById('f-pros').value.trim().split('\n').filter(Boolean);
  const cons = document.getElementById('f-cons').value.trim().split('\n').filter(Boolean);

  if (!product || !name || !title || !body || selectedRating === 0) {
    alert('製品名・ニックネーム・評価・タイトル・本文は必須です。');
    return;
  }

  const newReview = {
    id: Date.now(), cat, product,
    reviewer: name, date: new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'}),
    use: use || '用途未記入',
    rating: selectedRating, title, body,
    pros: pros.length ? pros : ['記載なし'],
    cons: cons.length ? cons : ['記載なし'],
    helpful: 0,
    amazonUrl: 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(product) + '&tag=' + AMAZON_TAG
  };

  reviews.unshift(newReview);
  document.getElementById('modal').style.display = 'none';
  filterCat = 'all';
  document.querySelectorAll('.chip[data-val]').forEach(c => c.classList.toggle('active', c.dataset.val === 'all'));
  renderReviews();
});

renderReviews();
</script>
</body>
</html>
